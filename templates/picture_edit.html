{% include 'layout.html' %}

<div class="container">
    <div class="card">
        <div class="card-header">
            {{ t(request, 'edit') }}
        </div>
        <div class="card-body">
            <form method="POST" action="/picture/edit/{{ picture.id }}">
                <div class="form-group">
                    <img src="{{ picture.picture_url }}" alt="Picture" class="img-fluid">
                </div>

                <div class="form-group">
                    <label>{{ t(request, 'description') }}</label>
                    <textarea class="form-control" name="description" rows="3" required>{{ picture.description }}</textarea>
                </div>

                <button type="submit" class="btn btn-primary">{{ t(request, 'save') }}</button>
            </form>
        </div>

        <div class="card-footer text-muted">
            <a href="/">{{ t(request, 'home') }}</a>
        </div>
    </div>
</div>
