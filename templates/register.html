{% include 'layout.html' %}

<div class="container">
    <div class="card">
        <div class="card-header">
            {{ t(request, 'register') }}
        </div>
        <div class="card-body">
            {% if msg %}
                <div class="alert alert-danger" role="alert">
                    {{ msg }}
                </div>

            {% endif %}

            <form method="POST" action="/register">

                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label>{{ t(request, 'email') }}</label>
                        <input type="email" class="form-control" name="email" required>
                    </div>

                    <div class="form-group col-md-6">
                        <label>{{ t(request, 'username') }}</label>
                        <input type="text" class="form-control" name="username" required>
                    </div>
                </div>


                <div class="form-group">
                    <label>{{ t(request, 'password') }}</label>
                    <input type="password" class="form-control" name="password" required>
                </div>

                <div class="form-group">
                    <label>{{ t(request, 'verify_password') }}</label>
                    <input type="password" class="form-control" name="password2" required>
                </div>

                <button type="submit" class="btn btn-primary">{{ t(request, 'sign_in') }}</button>

            </form>
        </div>

        <div class="card-footer text-muted">
            <a href="/login">{{ t(request, 'already_have_account') }}</a>
        </div>
    </div>
</div>
