{% include 'layout.html' %}

<div class="container">
    <h2>{{ t(request, 'edit') }}</h2>
    <form action="/comment/edit/{{ comment.id }}" method="post">
        <div class="form-group">
            <label for="content">{{ t(request, 'comments') }}:</label>
            <textarea class="form-control" id="content" name="content" rows="3">{{ comment.content }}</textarea>
        </div>
        <button type="submit" class="btn btn-primary">{{ t(request, 'save') }}</button>
    </form>
</div>
